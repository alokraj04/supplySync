
version: '3.8'

services:


  db:
    image: mysql:8.0
    container_name: supplysync-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: supplysync_db
      MYSQL_USER: supplysync_user
      MYSQL_PASSWORD: supplysync_pass
    ports:
      - "3307:3306"
    volumes:
      - supplysync-db-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - supplysync-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supplysync-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://db:3306/supplysync_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: supplysync_user
      DB_PASSWORD: supplysync_pass
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - supplysync-net


volumes:
  supplysync-db-data:
    driver: local


networks:
  supplysync-net:
    driver: bridge